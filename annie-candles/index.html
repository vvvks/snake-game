<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Blow the Candles, Annie! 🎂</title>
  <style>
    :root {
      --bg1:#1e1b4b; --bg2:#0f172a; --pink:#f472b6; --yellow:#fbbf24; --blue:#60a5fa; --green:#34d399;
      --panel: rgba(15,23,42,.72); --text:#f8fafc; --muted:#cbd5e1;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
    body {
      margin:0; min-height:100vh; overflow:hidden; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(244,114,182,.30), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(96,165,250,.28), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(52,211,153,.18), transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .confetti span { position:absolute; top:-30px; border-radius:3px; opacity:.88; animation: fall linear infinite; }
    @keyframes fall { from { transform: translateY(-10vh) rotate(0deg);} to { transform: translateY(110vh) rotate(560deg);} }
    .wrap { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:10px 10px 16px; }
    .hero { text-align:center; margin-bottom:8px; }
    .hero h1 { margin:2px 0; font-size:clamp(24px, 7vw, 48px); line-height:1.03; }
    .hero p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .annie-card {
      display:flex; align-items:center; gap:12px; width:min(96vw, 760px);
      background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:20px;
      padding:10px 12px; box-shadow:0 14px 45px rgba(0,0,0,.25); backdrop-filter: blur(10px);
      margin:6px 0 10px;
    }
    .avatar-wrap { position:relative; }
    .avatar-wrap::before {
      content:""; position:absolute; inset:-8px; border-radius:50%;
      background: conic-gradient(from 0deg, var(--pink), var(--yellow), var(--blue), var(--green), var(--pink));
      filter: blur(8px); opacity:.65;
    }
    .avatar { position:relative; width:72px; height:72px; border-radius:50%; object-fit:cover; object-position:center 30%; border:4px solid rgba(255,255,255,.95); }
    .meta b { display:block; font-size:20px; }
    .meta small { color:var(--muted); font-size:12px; }
    .game-shell {
      width:min(96vw, 820px); background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:24px;
      padding:12px; box-shadow:0 14px 45px rgba(0,0,0,.25); backdrop-filter: blur(10px);
    }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { background:rgba(255,255,255,.08); border-radius:999px; padding:8px 12px; font-size:13px; color:var(--muted); }
    .chip b { color:var(--text); }
    .field {
      position:relative; width:100%; min-height:66vh; aspect-ratio:16/12; overflow:hidden; border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.12), transparent 24%),
        linear-gradient(180deg, #1d4ed8 0%, #60a5fa 40%, #fde68a 41%, #f59e0b 100%);
      touch-action:none;
    }
    .stars, .sparkles { position:absolute; inset:0; pointer-events:none; }
    .stars span {
      position:absolute; width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,.9);
      box-shadow:0 0 10px rgba(255,255,255,.8);
      animation: twinkle 2.6s ease-in-out infinite;
    }
    @keyframes twinkle { 0%,100%{opacity:.35; transform:scale(.8)} 50%{opacity:1; transform:scale(1.3)} }
    .floating-title {
      position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:3; text-align:center;
      font-weight:900; font-size:clamp(18px, 4vw, 32px); color:rgba(255,255,255,.96); text-shadow:0 4px 16px rgba(0,0,0,.25);
    }
    .hint { position:absolute; top:60px; left:50%; transform:translateX(-50%); z-index:3; font-size:13px; color:#fff; opacity:.9; text-shadow:0 2px 10px rgba(0,0,0,.28); text-align:center; }
    .blow-meter {
      position:absolute; top:96px; left:50%; transform:translateX(-50%); width:min(240px, 72vw); height:14px; border-radius:999px;
      background:rgba(255,255,255,.14); overflow:hidden; border:1px solid rgba(255,255,255,.16); z-index:3;
    }
    .blow-meter-fill {
      height:100%; width:0%; background:linear-gradient(90deg, #60a5fa, #34d399, #fbbf24, #f472b6); transition:width .08s linear;
    }
    .cake-zone { position:absolute; left:50%; bottom:58px; transform:translateX(-50%); width:min(88%, 560px); height:300px; z-index:2; }
    .plate { position:absolute; left:50%; bottom:10px; transform:translateX(-50%); width:84%; height:18px; background:rgba(255,255,255,.92); border-radius:50%; box-shadow:0 10px 18px rgba(0,0,0,.18); }
    .cake-bottom {
      position:absolute; left:50%; bottom:24px; transform:translateX(-50%); width:76%; height:108px; border-radius:26px 26px 18px 18px;
      background:linear-gradient(180deg, #f9a8d4, #ec4899 60%, #be185d);
      box-shadow:inset 0 -8px 0 rgba(255,255,255,.14), 0 12px 24px rgba(0,0,0,.18);
    }
    .cake-middle {
      position:absolute; left:50%; bottom:106px; transform:translateX(-50%); width:58%; height:82px; border-radius:24px 24px 16px 16px;
      background:linear-gradient(180deg, #fcd34d, #f59e0b 62%, #d97706);
      box-shadow:inset 0 -7px 0 rgba(255,255,255,.16), 0 10px 20px rgba(0,0,0,.16);
    }
    .cake-top {
      position:absolute; left:50%; bottom:170px; transform:translateX(-50%); width:40%; height:58px; border-radius:22px 22px 14px 14px;
      background:linear-gradient(180deg, #93c5fd, #60a5fa 60%, #2563eb);
      box-shadow:inset 0 -6px 0 rgba(255,255,255,.16), 0 8px 16px rgba(0,0,0,.16);
    }
    .icing, .icing2, .icing3 {
      position:absolute; left:50%; transform:translateX(-50%); background:#fff; opacity:.95; filter:drop-shadow(0 6px 10px rgba(0,0,0,.08));
    }
    .icing { bottom:120px; width:60%; height:16px; border-radius:12px; }
    .icing2 { bottom:188px; width:42%; height:14px; border-radius:12px; }
    .icing3 { bottom:230px; width:24%; height:12px; border-radius:12px; }
    .annie-badge {
      position:absolute; left:50%; bottom:248px; transform:translateX(-50%); z-index:3;
      padding:8px 14px; border-radius:999px; font-weight:900; font-size:16px; color:#fff;
      background:linear-gradient(90deg, #f472b6, #fbbf24); box-shadow:0 8px 18px rgba(0,0,0,.22);
    }
    .candles { position:absolute; left:50%; bottom:220px; transform:translateX(-50%); width:74%; height:90px; z-index:4; }
    .candle {
      position:absolute; bottom:0; width:14px; height:52px; border-radius:8px; background:linear-gradient(180deg, #fff, #fecdd3 50%, #f472b6); box-shadow:0 6px 12px rgba(0,0,0,.12);
    }
    .wick { position:absolute; top:-6px; left:50%; transform:translateX(-50%); width:2px; height:8px; background:#111827; }
    .flame {
      position:absolute; top:-24px; left:50%; transform:translateX(-50%); width:18px; height:24px; border-radius:50% 50% 45% 45%;
      background:radial-gradient(circle at 50% 38%, #fff 0%, #fde68a 28%, #fb923c 62%, rgba(251,146,60,.2) 100%);
      box-shadow:0 0 14px rgba(251,146,60,.88), 0 0 28px rgba(251,146,60,.55);
      animation:flicker .22s ease-in-out infinite alternate;
      opacity:1;
    }
    .flame.out { opacity:0; animation:none; box-shadow:none; }
    @keyframes flicker { from { transform:translateX(-50%) scale(1) rotate(-2deg);} to { transform:translateX(-50%) scale(1.08) rotate(2deg);} }
    .blow-swirl {
      position:absolute; width:120px; height:40px; border-radius:999px; border-top:2px solid rgba(255,255,255,.75); border-bottom:2px solid transparent;
      opacity:0; pointer-events:none; z-index:5; filter:drop-shadow(0 0 8px rgba(255,255,255,.4));
    }
    .controls { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:12px; }
    button { border:none; border-radius:14px; padding:12px 16px; font-weight:800; cursor:pointer; color:#111827; background:linear-gradient(90deg, #fbbf24, #f472b6); }
    button.secondary { background:#334155; color:#e2e8f0; }
    .touch { width:min(340px, 96vw); margin:12px auto 0; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .touch button { padding:16px 0; font-size:18px; }
    .tip { text-align:center; color:var(--muted); font-size:13px; line-height:1.6; margin-top:10px; }
    .overlay { position:absolute; inset:0; display:grid; place-items:center; background:rgba(15,23,42,.24); padding:18px; z-index:10; }
    .message { text-align:center; background:rgba(15,23,42,.82); border:1px solid rgba(255,255,255,.15); border-radius:22px; padding:22px 18px; box-shadow:0 10px 30px rgba(0,0,0,.2); max-width:92%; }
    .message h2 { margin:0 0 8px; font-size:clamp(24px,6vw,38px); }
    .message p { margin:6px 0; color:var(--muted); }
  </style>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <div class="wrap">
    <div class="hero">
      <h1>🎉 Happy Birthday, Annie! 🎂</h1>
      <p>吹蜡烛生日礼物版 · 仪式感拉满 ✨</p>
    </div>

    <div class="annie-card">
      <div class="avatar-wrap"><img class="avatar" src="./annie.jpg" alt="Annie"></div>
      <div class="meta"><b>Annie</b><small>点按 / 滑动 / 长按来吹蜡烛，把生日愿望吹进夜空里</small></div>
    </div>

    <div class="game-shell">
      <div class="topbar">
        <div class="chips">
          <div class="chip">剩余蜡烛：<b id="candlesLeft">9</b></div>
          <div class="chip">完成度：<b id="progress">0</b>%</div>
          <div class="chip">模式：<b id="modeLabel">温柔吹气</b></div>
        </div>
      </div>
      <div class="field" id="field">
        <div class="stars" id="stars"></div>
        <div class="sparkles" id="sparkles"></div>
        <div class="floating-title">Blow the Candles for Annie 💫</div>
        <div class="hint">在蛋糕前左右滑动 / 连续点击 / 长按，都能制造“吹气”效果</div>
        <div class="blow-meter"><div class="blow-meter-fill" id="blowFill"></div></div>

        <div class="cake-zone">
          <div class="plate"></div>
          <div class="cake-bottom"></div>
          <div class="cake-middle"></div>
          <div class="cake-top"></div>
          <div class="icing"></div>
          <div class="icing2"></div>
          <div class="icing3"></div>
          <div class="annie-badge">Happy Birthday, Annie!</div>
          <div class="candles" id="candles"></div>
        </div>

        <div class="overlay" id="overlay">
          <div class="message">
            <h2>生日吹蜡烛来啦 🎂</h2>
            <p>把所有蜡烛都吹灭，就会触发 Annie 专属庆祝烟花。</p>
            <p>支持：点击、滑动、长按持续吹气，手机上也很好玩。</p>
            <div class="controls" style="margin-top:12px"><button id="startBtn">开始吹蜡烛</button></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <button id="restartBtn">重新开始</button>
        <button id="musicBtn" class="secondary">音乐：开</button>
        <button id="modeBtn" class="secondary">模式：温柔</button>
      </div>
      <div class="touch">
        <button id="tapBtn">轻吹</button>
        <button id="holdBtn">长吹</button>
        <button id="wishBtn">许愿 ✨</button>
      </div>
      <div class="tip">建议：一边左右滑动，一边连续点“轻吹”，蜡烛会更快熄灭。全部熄灭后有大庆祝效果。</div>
    </div>
  </div>
<script>
const field = document.getElementById('field');
const overlay = document.getElementById('overlay');
const candlesWrap = document.getElementById('candles');
const candlesLeftEl = document.getElementById('candlesLeft');
const progressEl = document.getElementById('progress');
const modeLabel = document.getElementById('modeLabel');
const blowFill = document.getElementById('blowFill');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const musicBtn = document.getElementById('musicBtn');
const modeBtn = document.getElementById('modeBtn');
const tapBtn = document.getElementById('tapBtn');
const holdBtn = document.getElementById('holdBtn');
const wishBtn = document.getElementById('wishBtn');
const confetti = document.getElementById('confetti');
const stars = document.getElementById('stars');
const sparkles = document.getElementById('sparkles');

let audioCtx = null, musicOn = true, musicTimer = null;
let candles = [], running = false, blowing = false, mode = 0;
const modes = [
  { name:'温柔吹气', power:1.0 },
  { name:'派对强风', power:1.35 },
  { name:'愿望暴击', power:1.7 },
];

function initStars(){
  for(let i=0;i<34;i++){
    const s=document.createElement('span');
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*56+'%';
    s.style.animationDelay=(Math.random()*2.5)+'s';
    stars.appendChild(s);
  }
}
function makeConfetti(){
  const colors=['#f472b6','#fbbf24','#60a5fa','#34d399','#fff'];
  for(let i=0;i<80;i++){
    const s=document.createElement('span');
    s.style.left=Math.random()*100+'vw';
    s.style.width=(8+Math.random()*8)+'px';
    s.style.height=(14+Math.random()*12)+'px';
    s.style.background=colors[i%colors.length];
    s.style.animationDuration=(4.5+Math.random()*4.5)+'s';
    s.style.animationDelay=(Math.random()*-8)+'s';
    confetti.appendChild(s);
  }
}
function burstFireworks(count=32){
  const colors=['#f472b6','#fbbf24','#60a5fa','#34d399','#fff'];
  for(let i=0;i<count;i++){
    const dot=document.createElement('span');
    dot.style.position='fixed';
    dot.style.left=(10+Math.random()*80)+'vw';
    dot.style.top=(8+Math.random()*62)+'vh';
    dot.style.width='10px'; dot.style.height='10px'; dot.style.borderRadius='50%';
    dot.style.background=colors[Math.floor(Math.random()*colors.length)];
    dot.style.boxShadow=`0 0 12px ${dot.style.background}, 0 0 28px ${dot.style.background}`;
    dot.style.pointerEvents='none'; dot.style.zIndex='2';
    dot.animate([
      {transform:'scale(.2)',opacity:0},
      {transform:'scale(1.9)',opacity:1,offset:.16},
      {transform:`translate(${(Math.random()*220-110)}px, ${(Math.random()*220-110)}px) scale(.8)`,opacity:0}
    ],{duration:1400+Math.random()*800,easing:'ease-out'});
    document.body.appendChild(dot);
    setTimeout(()=>dot.remove(),2400);
  }
}
function sparkle(x, y){
  for(let i=0;i<10;i++){
    const p=document.createElement('span');
    p.style.position='absolute'; p.style.left=x+'px'; p.style.top=y+'px';
    p.style.width='8px'; p.style.height='8px'; p.style.borderRadius='50%';
    p.style.background=['#fff','#fde68a','#fbbf24','#f472b6'][Math.floor(Math.random()*4)];
    p.style.boxShadow=`0 0 10px ${p.style.background}`; p.style.zIndex='6'; p.style.pointerEvents='none';
    sparkles.appendChild(p);
    const dx=(Math.random()*120-60), dy=(Math.random()*-90);
    p.animate([
      {transform:'translate(-50%,-50%) scale(.2)',opacity:1},
      {transform:`translate(${dx}px, ${dy}px) scale(1)`,opacity:1,offset:.35},
      {transform:`translate(${dx*1.4}px, ${dy+40}px) scale(.2)`,opacity:0}
    ],{duration:800+Math.random()*300,easing:'ease-out'});
    setTimeout(()=>p.remove(),1200);
  }
}

function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function playNote(freq,start,duration,type='triangle',volume=0.02){ if(!musicOn) return; ensureAudio(); const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,start); gain.gain.setValueAtTime(0.0001,start); gain.gain.exponentialRampToValueAtTime(volume,start+0.02); gain.gain.exponentialRampToValueAtTime(0.0001,start+duration); osc.connect(gain).connect(audioCtx.destination); osc.start(start); osc.stop(start+duration+0.03); }
function playChord(freqs,start,duration,volume=0.012){ freqs.forEach(f=>playNote(f,start,duration,'sine',volume)); }
function playBirthdayLoop(){
  if(!musicOn) return; ensureAudio(); stopMusic();
  const n={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,C5:523.25};
  const chords={C:[261.63,329.63,392],F:[349.23,440,523.25],G:[392,493.88,587.33]};
  const melody=[['G4',0.32],['G4',0.15],['A4',0.42],['G4',0.42],['C5',0.46],['Bb4',0.88],['G4',0.32],['G4',0.15],['A4',0.42],['G4',0.42],['D4',0.46],['C5',0.88],['G4',0.32],['G4',0.15],['G4',0.42],['E4',0.42],['C5',0.46],['Bb4',0.42],['A4',0.88],['F4',0.32],['F4',0.15],['E4',0.42],['C5',0.42],['D4',0.46],['C5',1.0]];
  const harmony=[['C',2.7],['G',2.7],['C',3.0],['F',2.8]];
  let t=audioCtx.currentTime+.06; harmony.forEach(([ch,d])=>{ playChord(chords[ch],t,d,0.008); t+=d; });
  t=audioCtx.currentTime+.08; melody.forEach(([note,d])=>{ playNote(n[note],t,d,'triangle',0.024); playNote(n[note]/2,t,d,'sine',0.008); t+=d; });
  musicTimer=setTimeout(playBirthdayLoop,(t-audioCtx.currentTime)*1000+320);
}
function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; } }

function updateHUD(){
  const out = candles.filter(c=>!c.out).length;
  candlesLeftEl.textContent = out;
  progressEl.textContent = Math.round((1 - out / candles.length) * 100);
  modeLabel.textContent = modes[mode].name;
  modeBtn.textContent = `模式：${['温柔','派对','暴击'][mode]}`;
}

function createCandles(){
  candlesWrap.innerHTML='';
  candles = [];
  const positions = [6,16,26,36,46,56,66,76,86];
  positions.forEach((left, idx) => {
    const c = document.createElement('div'); c.className='candle'; c.style.left=left+'%';
    const wick = document.createElement('div'); wick.className='wick';
    const flame = document.createElement('div'); flame.className='flame';
    c.appendChild(wick); c.appendChild(flame); candlesWrap.appendChild(c);
    candles.push({ el:c, flame, out:false, power:0, idx });
  });
  updateHUD();
}

function extinguishOne(strength=1){
  const lit = candles.filter(c=>!c.out);
  if(!lit.length) return;
  const target = lit[Math.floor(Math.random() * Math.min(lit.length, 2 + Math.floor(strength)))];
  if(!target) return;
  target.power += strength * modes[mode].power;
  if(target.power >= 1.6){
    target.out = true;
    target.flame.classList.add('out');
    const rect = target.el.getBoundingClientRect();
    const fr = field.getBoundingClientRect();
    sparkle(rect.left - fr.left + rect.width/2, rect.top - fr.top + 8);
    updateHUD();
    if(candles.every(c=>c.out)) finishCelebration();
  }
}

function spawnBlow(xPercent = 52){
  const swirl = document.createElement('div');
  swirl.className = 'blow-swirl';
  swirl.style.left = `calc(${xPercent}% - 60px)`;
  swirl.style.top = `${180 + Math.random()*80}px`;
  swirl.style.opacity = '1';
  field.appendChild(swirl);
  swirl.animate([
    { transform:'translateX(0) scaleX(.6)', opacity:.2 },
    { transform:'translateX(140px) scaleX(1)', opacity:1, offset:.35 },
    { transform:'translateX(260px) scaleX(1.15)', opacity:0 }
  ], { duration: 560, easing:'ease-out' });
  setTimeout(()=> swirl.remove(), 620);
}

function handleBlow(power=1){
  if(!running) return;
  blowFill.style.width = `${Math.min(100, 30 + power * 28)}%`;
  clearTimeout(handleBlow.t);
  handleBlow.t = setTimeout(()=> blowFill.style.width = '0%', 140);
  spawnBlow(18 + Math.random()*64);
  extinguishOne(power);
  if(power > 1.2 && Math.random() > 0.35) extinguishOne(power * 0.65);
}

function finishCelebration(){
  running = false;
  burstFireworks(120);
  setTimeout(()=>burstFireworks(90), 480);
  setTimeout(()=>burstFireworks(70), 1020);
  overlay.innerHTML = `<div class="message"><h2>🎆 Happy Birthday, Annie! 🎂</h2><p>你把所有蜡烛都吹灭啦，愿望已经送进星空。</p><p>今晚要超级开心，也要被很多很多爱包围 ✨</p><div class="controls" style="margin-top:12px"><button id="againBtn">再吹一次</button></div></div>`;
  overlay.style.display='grid';
  document.getElementById('againBtn').onclick = startGame;
}

function startGame(){
  createCandles();
  running = true;
  overlay.style.display='none';
  burstFireworks(18);
  if(musicOn) playBirthdayLoop();
}

startBtn.onclick = startGame;
restartBtn.onclick = startGame;
musicBtn.onclick = ()=>{ musicOn=!musicOn; musicBtn.textContent=`音乐：${musicOn?'开':'关'}`; if(musicOn) playBirthdayLoop(); else stopMusic(); };
modeBtn.onclick = ()=>{ mode = (mode + 1) % modes.length; updateHUD(); };
tapBtn.onclick = ()=> handleBlow(1.0);
let holding = false, holdTimer = null;
holdBtn.onpointerdown = ()=>{ holding=true; handleBlow(1.2); holdTimer = setInterval(()=> handleBlow(1.3), 180); };
window.addEventListener('pointerup', ()=>{ holding=false; if(holdTimer) clearInterval(holdTimer); holdTimer=null; });
wishBtn.onclick = ()=>{ burstFireworks(24); handleBlow(1.8); };

let touchStartX = null;
field.addEventListener('pointerdown', e=>{ if(!running) return; touchStartX = e.clientX; handleBlow(.95); });
field.addEventListener('pointermove', e=>{
  if(!running || touchStartX == null) return;
  const dx = e.clientX - touchStartX;
  if(Math.abs(dx) > 10){ handleBlow(1.15 + Math.min(1, Math.abs(dx) / 120)); touchStartX = e.clientX; }
});
window.addEventListener('pointerup', ()=> touchStartX = null);

initStars(); makeConfetti(); createCandles(); updateHUD();
</script>
</body>
</html>
