<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Happy Birthday, Annie! 🎂</title>
  <style>
    :root {
      --bg1:#1e1b4b; --bg2:#0f172a; --pink:#f472b6; --yellow:#fbbf24; --blue:#60a5fa; --green:#34d399;
      --panel: rgba(15,23,42,.74); --text:#f8fafc; --muted:#cbd5e1;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin:0; min-height:100vh; overflow:hidden; color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(244,114,182,.32), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(96,165,250,.30), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(52,211,153,.18), transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .confetti span { position:absolute; top:-30px; border-radius:3px; opacity:.85; animation:fall linear infinite; }
    @keyframes fall { from { transform: translateY(-10vh) rotate(0deg);} to { transform: translateY(110vh) rotate(560deg);} }
    .wrap { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:10px 10px 16px; }
    .hero { text-align:center; margin-bottom:6px; }
    .hero h1 { margin:2px 0; font-size:clamp(24px, 6.8vw, 46px); line-height:1.03; }
    .hero p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .annie-card {
      display:flex; align-items:center; gap:12px; width:min(96vw, 720px);
      background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:20px;
      padding:10px 12px; box-shadow:0 14px 45px rgba(0,0,0,.25); backdrop-filter: blur(10px);
      margin:6px 0 10px;
    }
    .avatar-wrap { position:relative; }
    .avatar-wrap::before {
      content:""; position:absolute; inset:-8px; border-radius:50%;
      background: conic-gradient(from 0deg, var(--pink), var(--yellow), var(--blue), var(--green), var(--pink));
      filter: blur(8px); opacity:.65;
    }
    .avatar { width:72px; height:72px; border-radius:50%; object-fit:cover; object-position:center 30%; border:4px solid rgba(255,255,255,.92); position:relative; }
    .meta b { display:block; font-size:20px; }
    .meta small { color:var(--muted); font-size:12px; }
    .game-shell {
      width:min(98vw, 760px); background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:22px;
      padding:10px; box-shadow:0 14px 45px rgba(0,0,0,.25); backdrop-filter: blur(10px);
    }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { background:rgba(255,255,255,.08); border-radius:999px; padding:7px 10px; font-size:13px; color:var(--muted); }
    .chip b { color:var(--text); }
    .field {
      position:relative; width:100%; min-height:68vh; aspect-ratio:16/13.8; overflow:hidden; border-radius:20px;
      border:1px solid rgba(255,255,255,.1); touch-action:pan-y;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg, #1d4ed8 0%, #60a5fa 30%, #fef3c7 31%, #fde68a 100%);
    }
    .field::after { content:""; position:absolute; left:0; right:0; bottom:0; height:24%; background:linear-gradient(180deg,#86efac,#4ade80); z-index:0; }
    .floating-title { position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:3; font-weight:900; text-align:center; font-size:clamp(18px,4vw,30px); color:rgba(255,255,255,.94); text-shadow:0 3px 14px rgba(0,0,0,.25); }
    .combo { position:absolute; top:50px; left:50%; transform:translateX(-50%); z-index:4; font-weight:900; font-size:18px; color:#fff; text-shadow:0 0 16px rgba(244,114,182,.75); opacity:0; transition:.2s; }
    .player {
      position:absolute; z-index:5; width:94px; height:94px; bottom:28px; left:50%; transform:translateX(-50%);
      border-radius:50%; background:url('./annie.jpg') center 28% / cover no-repeat;
      border:5px solid rgba(255,255,255,.98);
      box-shadow:0 12px 28px rgba(0,0,0,.30),0 0 0 6px rgba(255,255,255,.18),0 0 20px rgba(244,114,182,.35);
      transition:left .05s linear, transform .12s cubic-bezier(.2,.8,.2,1);
    }
    .player::after {
      content:"Annie"; position:absolute; left:50%; transform:translateX(-50%); bottom:-30px; white-space:nowrap;
      font-size:12px; font-weight:800; color:#fff; background:rgba(15,23,42,.72); border:1px solid rgba(255,255,255,.18);
      border-radius:999px; padding:4px 9px; box-shadow:0 6px 14px rgba(0,0,0,.18);
    }
    .pulse { animation:pulse .28s ease; }
    @keyframes pulse { 0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}100%{transform:translateX(-50%) scale(1)} }
    .item { position:absolute; z-index:4; width:52px; height:52px; display:grid; place-items:center; font-size:38px; user-select:none; filter:drop-shadow(0 6px 12px rgba(0,0,0,.18)); }
    .controls { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
    button { border:none; border-radius:14px; padding:12px 16px; font-weight:800; cursor:pointer; color:#111827; background:linear-gradient(90deg,#fbbf24,#f472b6); }
    button.secondary { background:#334155; color:#e2e8f0; }
    .touch { width:min(340px,96vw); margin:12px auto 0; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .touch button { padding:16px 0; font-size:18px; }
    .tip { text-align:center; color:var(--muted); font-size:13px; line-height:1.5; margin-top:10px; }
    .overlay { position:absolute; inset:0; display:grid; place-items:center; background:rgba(15,23,42,.28); padding:18px; z-index:8; }
    .message { text-align:center; background:rgba(15,23,42,.78); border:1px solid rgba(255,255,255,.15); border-radius:22px; padding:22px 18px; box-shadow:0 10px 30px rgba(0,0,0,.2); max-width:92%; }
    .message h2 { margin:0 0 8px; font-size:clamp(24px,6vw,38px); }
    .message p { margin:6px 0; color:var(--muted); }
  </style>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <div class="wrap">
    <div class="hero">
      <h1>🎉 Happy Birthday, Annie! 🎂</h1>
      <p>生日冲刺版：自由移动接礼物，连击越高越爽 ✨</p>
    </div>

    <div class="annie-card">
      <div class="avatar-wrap"><img class="avatar" src="./annie.jpg" alt="Annie"></div>
      <div class="meta"><b>Annie</b><small>30 秒冲刺 · 自由移动 · 连击追分</small></div>
    </div>

    <div class="game-shell">
      <div class="topbar">
        <div class="chips">
          <div class="chip">分数：<b id="score">0</b></div>
          <div class="chip">时间：<b id="time">30</b>s</div>
          <div class="chip">连击：<b id="comboNum">0</b></div>
          <div class="chip">最高分：<b id="best">0</b></div>
        </div>
      </div>
      <div class="field" id="field">
        <div class="floating-title">Birthday Rush for Annie! ✨</div>
        <div class="combo" id="comboText">COMBO x2</div>
        <div class="player" id="player"></div>
        <div class="overlay" id="overlay">
          <div class="message">
            <h2>生日冲刺来啦 🎮</h2>
            <p>自由移动接住 <b>🍰🎁⭐🎈</b>，躲开 <b>💣</b></p>
            <p>连续接中会涨连击，<b>🎁 彩虹礼盒 +8分</b>，炸弹命中会有爆炸特效并打断节奏</p>
            <div class="controls" style="margin-top:12px"><button id="startBtn">开始冲刺</button></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <button id="restartBtn">重新开始</button>
        <button id="musicBtn" class="secondary">音乐：开</button>
      </div>
      <div class="touch">
        <button id="lane1">左</button>
        <button id="lane2">停</button>
        <button id="lane3">右</button>
      </div>
      <div class="tip">左右自由移动接礼物；手机上滑动即可灵活走位。</div>
    </div>
  </div>
<script>
const field = document.getElementById('field');
const player = document.getElementById('player');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const comboNum = document.getElementById('comboNum');
const comboText = document.getElementById('comboText');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const musicBtn = document.getElementById('musicBtn');
const confetti = document.getElementById('confetti');
const laneBtns = [document.getElementById('lane1'), document.getElementById('lane2'), document.getElementById('lane3')];

let score = 0, timeLeft = 30, best = Number(localStorage.getItem('annie-bday-best') || 0);
let running = false, spawnTimer = null, timerInterval = null;
let musicOn = true, audioCtx = null, musicTimer = null;
let combo = 0, celebrated = false;
let playerX = 0.5, velocity = 0, inertiaFrame = null;
bestEl.textContent = best;

function setPlayer(){ const max = field.clientWidth - player.clientWidth; player.style.left = (playerX * max) + 'px'; }
function movePlayer(delta){ playerX = Math.min(1, Math.max(0, playerX + delta)); setPlayer(); }
function kickPlayer(delta){ velocity += delta; velocity = Math.max(-0.11, Math.min(0.11, velocity)); if(!inertiaFrame) runInertia(); }
function runInertia(){ inertiaFrame = requestAnimationFrame(() => { if(Math.abs(velocity) < 0.001){ velocity = 0; inertiaFrame = null; return; } movePlayer(velocity); if(playerX <= 0 || playerX >= 1) velocity *= 0.45; velocity *= 0.9; runInertia(); }); }

function makeConfetti(){
  const colors=['#f472b6','#fbbf24','#60a5fa','#34d399','#fff'];
  for(let i=0;i<72;i++){
    const s=document.createElement('span');
    s.style.left=Math.random()*100+'vw';
    s.style.width=(8+Math.random()*8)+'px';
    s.style.height=(14+Math.random()*12)+'px';
    s.style.background=colors[i%colors.length];
    s.style.animationDuration=(4.5+Math.random()*4.5)+'s';
    s.style.animationDelay=(Math.random()*-8)+'s';
    confetti.appendChild(s);
  }
}
function burstFireworks(count=24){
  const colors=['#f472b6','#fbbf24','#60a5fa','#34d399','#fff'];
  for(let i=0;i<count;i++){
    const dot=document.createElement('span');
    dot.style.position='fixed';
    dot.style.left=(10+Math.random()*80)+'vw';
    dot.style.top=(8+Math.random()*60)+'vh';
    dot.style.width='10px';
    dot.style.height='10px';
    dot.style.borderRadius='50%';
    dot.style.background=colors[Math.floor(Math.random()*colors.length)];
    dot.style.boxShadow=`0 0 12px ${dot.style.background},0 0 28px ${dot.style.background}`;
    dot.style.pointerEvents='none';
    dot.style.zIndex='2';
    dot.animate([
      {transform:'scale(.2)',opacity:0},
      {transform:'scale(1.8)',opacity:1,offset:.18},
      {transform:`translate(${(Math.random()*180-90)}px, ${(Math.random()*180-90)}px) scale(.8)`,opacity:0}
    ],{duration:1300+Math.random()*700,easing:'ease-out'});
    document.body.appendChild(dot);
    setTimeout(()=>dot.remove(),2200);
  }
}
function bombExplosion(x, y){
  const colors=['#fb7185','#f59e0b','#fde047','#ffffff','#ef4444'];
  for(let i=0;i<52;i++){
    const p=document.createElement('span');
    p.style.position='absolute';
    p.style.left=x+'px';
    p.style.top=y+'px';
    p.style.width=(10+Math.random()*16)+'px';
    p.style.height=(10+Math.random()*16)+'px';
    p.style.borderRadius=Math.random()>.4?'50%':'2px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.pointerEvents='none';
    p.style.zIndex='9';
    p.style.boxShadow=`0 0 12px ${p.style.background}, 0 0 24px ${p.style.background}`;
    field.appendChild(p);
    const dx=(Math.random()*260-130), dy=(Math.random()*-220);
    p.animate([
      {transform:'translate(-50%,-50%) scale(0.15)',opacity:1},
      {transform:`translate(${dx}px, ${dy}px) scale(1.45)`,opacity:1,offset:0.25},
      {transform:`translate(${dx*1.5}px, ${dy+150}px) scale(0.35)`,opacity:0}
    ],{duration:980+Math.random()*420,easing:'cubic-bezier(.12,.88,.22,1)'});
    setTimeout(()=>p.remove(),1500);
  }
  const flash=document.createElement('div');
  flash.style.position='absolute'; flash.style.left=(x-70)+'px'; flash.style.top=(y-70)+'px'; flash.style.width='140px'; flash.style.height='140px'; flash.style.borderRadius='50%';
  flash.style.background='radial-gradient(circle, rgba(255,255,255,.95), rgba(251,113,133,.45), rgba(251,113,133,0))';
  flash.style.pointerEvents='none'; flash.style.zIndex='8'; field.appendChild(flash);
  flash.animate([{transform:'scale(.2)',opacity:1},{transform:'scale(1.8)',opacity:.9,offset:.35},{transform:'scale(2.4)',opacity:0}],{duration:520,easing:'ease-out'});
  setTimeout(()=>flash.remove(),600);
  player.animate([
    { transform:'translateX(-50%) rotate(0deg) scale(1)' },
    { transform:'translateX(-50%) rotate(-12deg) scale(.92)' },
    { transform:'translateX(-50%) rotate(10deg) scale(1.06)' },
    { transform:'translateX(-50%) rotate(-6deg) scale(.97)' },
    { transform:'translateX(-50%) rotate(0deg) scale(1)' }
  ],{duration:360,easing:'ease-out'});
  field.animate([
    {transform:'translateX(0px)'},{transform:'translateX(-12px)'},{transform:'translateX(12px)'},{transform:'translateX(-8px)'},{transform:'translateX(0px)'}
  ],{duration:360,easing:'ease-out'});
}

makeConfetti();
setTimeout(()=>burstFireworks(26),450);

function ensureAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
function playNote(freq,start,duration,type='triangle',volume=0.02){ if(!musicOn) return; ensureAudio(); const osc=audioCtx.createOscillator(); const gain=audioCtx.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,start); gain.gain.setValueAtTime(0.0001,start); gain.gain.exponentialRampToValueAtTime(volume,start+0.02); gain.gain.exponentialRampToValueAtTime(0.0001,start+duration); osc.connect(gain).connect(audioCtx.destination); osc.start(start); osc.stop(start+duration+0.03); }
function playChord(freqs,start,duration,volume=0.012){ freqs.forEach(f=>playNote(f,start,duration,'sine',volume)); }
function playBirthdayLoop(){
  if(!musicOn) return; ensureAudio(); stopMusic();
  const n={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,C5:523.25};
  const chords={C:[261.63,329.63,392],F:[349.23,440,523.25],G:[392,493.88,587.33]};
  const melody=[['G4',0.24],['G4',0.12],['A4',0.32],['G4',0.30],['C5',0.34],['Bb4',0.64],['G4',0.24],['G4',0.12],['A4',0.32],['G4',0.30],['D4',0.34],['C5',0.64],['G4',0.24],['G4',0.12],['G4',0.30],['E4',0.30],['C5',0.34],['Bb4',0.30],['A4',0.64],['F4',0.24],['F4',0.12],['E4',0.30],['C5',0.30],['D4',0.34],['C5',0.70]];
  const harmony=[['C',2.1],['G',2.1],['C',2.3],['F',2.1]];
  let t=audioCtx.currentTime+.05;
  harmony.forEach(([ch,d])=>{ playChord(chords[ch],t,d,0.008); t+=d; });
  t=audioCtx.currentTime+.06;
  melody.forEach(([note,d])=>{ playNote(n[note],t,d,'triangle',0.024); playNote(n[note]/2,t,d,'sine',0.007); t+=d; });
  musicTimer=setTimeout(playBirthdayLoop,(t-audioCtx.currentTime)*1000+260);
}
function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; } }

function updateHUD(){ scoreEl.textContent=score; timeEl.textContent=Math.max(0,Math.ceil(timeLeft)); comboNum.textContent=combo; bestEl.textContent=best; }
function showCombo(){ if(combo < 2) return; comboText.textContent=`COMBO x${combo}`; comboText.style.opacity=1; clearTimeout(showCombo.t); showCombo.t=setTimeout(()=> comboText.style.opacity=0, 420); }
function resetGame(){ document.querySelectorAll('.item').forEach(e=>e.remove()); score=0; timeLeft=30; combo=0; celebrated=false; playerX=0.5; velocity=0; if(inertiaFrame){ cancelAnimationFrame(inertiaFrame); inertiaFrame=null; } updateHUD(); comboText.style.opacity=0; setPlayer(); }

function spawnItem(){
  if(!running) return;
  const items=[
    {emoji:'🍰', points:2, bonus:0, good:true},
    {emoji:'⭐', points:1, bonus:0, good:true},
    {emoji:'🎈', points:2, bonus:0, good:true},
    {emoji:'🎁', points:8, bonus:0, good:true},
    {emoji:'💣', points:0, bonus:0, good:false}
  ];
  const roll=Math.random();
  const pick=roll<0.14?items[4]:roll<0.30?items[3]:items[Math.floor(Math.random()*3)];
  if(pick.emoji === '💣') { elStyleBomb = true; } else { elStyleBomb = false; }
  const el=document.createElement('div');
  el.className='item'; el.textContent=pick.emoji;
  if(pick.emoji === '💣'){
    el.style.background = 'radial-gradient(circle, rgba(255,255,255,.96) 0%, rgba(254,226,226,.96) 18%, rgba(239,68,68,.96) 55%, rgba(185,28,28,.96) 100%)';
    el.style.border = '3px solid rgba(255,255,255,.92)';
    el.style.borderRadius = '50%';
    el.style.boxShadow = '0 0 10px rgba(239,68,68,.75), 0 0 28px rgba(239,68,68,.55), inset 0 0 10px rgba(255,255,255,.4)';
    el.style.color = '#7f1d1d';
    el.style.fontSize = '30px';
  }
  el.dataset.good=String(pick.good); el.dataset.points=String(pick.points); el.dataset.bonus=String(pick.bonus);
  el.style.left = Math.random() * (field.clientWidth - 60) + 'px'; el.style.top='56px';
  field.appendChild(el);
  let y=56; const speed=5.2 + Math.random()*2 + Math.min(4, score*0.03);
  function fall(){
    if(!running){ el.remove(); return; }
    y += speed; el.style.top = y + 'px';
    const pr = player.getBoundingClientRect(); const ir = el.getBoundingClientRect(); const caught = !(ir.right < pr.left || ir.left > pr.right || ir.bottom < pr.top || ir.top > pr.bottom);
    if(caught){
      if(el.dataset.good === 'true'){
        combo += 1;
        let gained = Number(el.dataset.points);
        if(combo >= 3) gained += 1;
        if(combo >= 6) gained += 2;
        score += gained;
        showCombo();
        if(score > best){ best=score; localStorage.setItem('annie-bday-best', best); }
        if(score >= 30 && !celebrated){ celebrated=true; burstFireworks(90); setTimeout(()=>burstFireworks(70),400); setTimeout(()=>burstFireworks(55),1000); }
      } else {
        combo = 0;
        const fr = field.getBoundingClientRect();
        bombExplosion(ir.left - fr.left + ir.width/2, ir.top - fr.top + ir.height/2);
      }
      updateHUD(); el.remove(); return;
    }
    if(y > field.clientHeight - 6){ if(el.dataset.good === 'true') combo = 0; el.remove(); updateHUD(); return; }
    requestAnimationFrame(fall);
  }
  requestAnimationFrame(fall);
}

function startGame(){
  resetGame(); running=true; overlay.style.display='none'; stopTimers(); burstFireworks(18); if(musicOn) playBirthdayLoop();
  spawnTimer=setInterval(spawnItem, 520);
  timerInterval=setInterval(()=>{ timeLeft -= 1; updateHUD(); if(timeLeft <= 0) endGame(score >= 30); },1000);
}
function stopTimers(){ if(spawnTimer) clearInterval(spawnTimer); if(timerInterval) clearInterval(timerInterval); }
function endGame(win){
  running=false; stopTimers(); burstFireworks(win ? 110 : 22);
  overlay.innerHTML=`<div class="message"><h2>${win ? '大成功！生日快乐，Annie！🎆' : '时间到啦，Annie！🎂'}</h2><p>本局得分：<b>${score}</b></p><p>${win ? '你冲过了 30 分，解锁了超级生日烟花！' : '再来一局，连击打起来会更容易破 30 分～'}</p><div class="controls" style="margin-top:12px"><button id="againBtn">再玩一局</button></div></div>`;
  overlay.style.display='grid'; document.getElementById('againBtn').onclick=startGame;
}

startBtn.onclick=startGame; restartBtn.onclick=startGame;
musicBtn.onclick=()=>{ musicOn=!musicOn; musicBtn.textContent=`音乐：${musicOn?'开':'关'}`; if(musicOn) playBirthdayLoop(); else stopMusic(); };
laneBtns[0].onclick=()=>kickPlayer(-0.060); laneBtns[1].onclick=()=>{ velocity = 0; }; laneBtns[2].onclick=()=>kickPlayer(0.060);
window.addEventListener('keydown', e=>{ if(e.key==='ArrowLeft') kickPlayer(-0.042); if(e.key==='ArrowRight') kickPlayer(0.042); });
let touchStartX=null;
field.addEventListener('touchstart', e=>{ touchStartX=e.touches[0].clientX; }, {passive:true});
field.addEventListener('touchmove', e=>{ if(touchStartX==null) return; const dx=e.touches[0].clientX-touchStartX; movePlayer(dx / field.clientWidth * 0.58); kickPlayer(dx / field.clientWidth * 0.022); touchStartX=e.touches[0].clientX; }, {passive:true});
field.addEventListener('touchend', ()=> touchStartX=null, {passive:true});
window.addEventListener('resize', setPlayer);
updateHUD(); setPlayer();
</script>
</body>
</html>
