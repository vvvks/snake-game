<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Happy Birthday, Annie! 🎂</title>
  <style>
    :root {
      --bg1:#1e1b4b; --bg2:#0f172a; --pink:#f472b6; --yellow:#fbbf24; --blue:#60a5fa; --green:#34d399;
      --panel: rgba(15,23,42,.72); --text:#f8fafc; --muted:#cbd5e1;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      min-height:100vh; overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(244,114,182,.30), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(96,165,250,.28), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(52,211,153,.18), transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .confetti span {
      position:absolute; width:10px; height:18px; top:-30px; opacity:.85; border-radius:3px;
      animation: fall linear infinite;
    }
    @keyframes fall { from { transform: translateY(-10vh) rotate(0deg);} to { transform: translateY(110vh) rotate(560deg);} }
    .wrap { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:10px 10px 16px; }
    .hero { text-align:center; margin-bottom:6px; }
    .hero h1 { margin:2px 0; font-size:clamp(24px, 6.8vw, 46px); line-height:1.03; }
    .hero p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .annie-card {
      display:flex; align-items:center; gap:12px; background:var(--panel); backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,.12); border-radius:20px; padding:10px 12px; box-shadow:0 14px 45px rgba(0,0,0,.25);
      margin: 6px 0 10px;
      width:min(96vw, 720px);
    }
    .avatar-wrap { position:relative; }
    .avatar-wrap::before {
      content:""; position:absolute; inset:-8px; border-radius:50%;
      background: conic-gradient(from 0deg, var(--pink), var(--yellow), var(--blue), var(--green), var(--pink));
      filter: blur(8px); opacity:.65;
    }
    .avatar {
      position:relative; width:72px; height:72px; border-radius:50%; object-fit:cover; object-position:center 30%;
      border:4px solid rgba(255,255,255,.92);
      filter: contrast(1.15) saturate(1.2) brightness(1.04) drop-shadow(0 8px 16px rgba(0,0,0,.25));
      image-rendering:auto;
    }
    .avatar.cartoon {
      box-shadow: 0 0 0 4px rgba(255,255,255,.18), 0 10px 24px rgba(0,0,0,.28);
    }
    .meta b { display:block; font-size:20px; }
    .meta small { color:var(--muted); font-size:12px; }
    .game-shell {
      width:min(98vw, 760px); background:var(--panel); border:1px solid rgba(255,255,255,.12); border-radius:22px;
      padding:10px; box-shadow:0 14px 45px rgba(0,0,0,.25); backdrop-filter: blur(10px);
    }
    .topbar { display:flex; justify-content:space-between; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { background:rgba(255,255,255,.08); border-radius:999px; padding:7px 10px; font-size:13px; color:var(--muted); }
    .chip b { color:var(--text); }
    .field {
      position:relative; width:100%; aspect-ratio: 16 / 13.8; min-height: 68vh; overflow:hidden; border-radius:20px;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg, #1d4ed8 0%, #60a5fa 32%, #fef3c7 33%, #fde68a 100%);
      border:1px solid rgba(255,255,255,.1);
    }
    .field::after { content:""; position:absolute; left:0; right:0; bottom:0; height:24%; background:linear-gradient(180deg, #86efac, #4ade80); z-index:0; }
    .floating-title {
      position:absolute; top:14px; left:50%; transform:translateX(-50%); font-weight:900; text-align:center;
      font-size:clamp(18px, 4vw, 30px); color:rgba(255,255,255,.9); text-shadow:0 3px 14px rgba(0,0,0,.25);
    }
    .player {
      position:absolute; z-index:4; width:92px; height:92px; left:calc(50% - 46px); bottom:34px; border-radius:50%;
      background:url('./annie.jpg') center 28% / cover no-repeat;
      border:5px solid rgba(255,255,255,.98);
      box-shadow:0 12px 28px rgba(0,0,0,.30), 0 0 0 6px rgba(255,255,255,.18), 0 0 20px rgba(244,114,182,.35);
      filter: saturate(1.22) contrast(1.2) brightness(1.08);
    }
    .player::after {
      content:""; position:absolute; inset:-10px; border-radius:50%; border:3px dashed rgba(255,255,255,.35);
      animation: spin 10s linear infinite;
    }
    .player::before {
      content:"Annie";
      position:absolute;
      left:50%; transform:translateX(-50%);
      bottom:-30px;
      white-space:nowrap;
      font-size:12px; font-weight:800;
      color:#fff;
      background:rgba(15,23,42,.72);
      border:1px solid rgba(255,255,255,.18);
      border-radius:999px;
      padding:4px 9px;
      box-shadow:0 6px 14px rgba(0,0,0,.18);
    }
    @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
    .item {
      position:absolute; z-index:3; width:42px; height:42px; display:grid; place-items:center; font-size:32px; user-select:none;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,.18));
    }
    .controls { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; margin-top:10px; }
    button {
      border:none; border-radius:14px; padding:12px 16px; font-weight:800; cursor:pointer; color:#111827;
      background:linear-gradient(90deg, #fbbf24, #f472b6);
    }
    button.secondary { background:#334155; color:#e2e8f0; }
    .touch { width:min(300px, 92vw); margin:12px auto 0; display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .touch button { padding:14px 0; font-size:18px; }
    .touch .empty { visibility:hidden; }
    .tip { text-align:center; color:var(--muted); font-size:13px; line-height:1.5; margin-top:10px; }
    .overlay {
      position:absolute; inset:0; display:grid; place-items:center; background:rgba(15,23,42,.28); padding:18px;
    }
    .message {
      text-align:center; background:rgba(15,23,42,.78); border:1px solid rgba(255,255,255,.15); border-radius:22px;
      padding:22px 18px; box-shadow:0 10px 30px rgba(0,0,0,.2); max-width:92%;
    }
    .message h2 { margin:0 0 8px; font-size:clamp(24px,6vw,38px); }
    .message p { margin:6px 0; color:var(--muted); }
  </style>
</head>
<body>
  <audio id="bgm" src="./birthday.ogg" preload="auto" loop></audio>
  <div class="confetti" id="confetti"></div>
  <div class="wrap">
    <div class="hero">
      <h1>🎉 Happy Birthday, Annie! 🎂</h1>
      <p>小礼物版小游戏：接住蛋糕和礼物，躲开闹钟 ⏰</p>
    </div>

    <div class="annie-card">
      <div class="avatar-wrap"><img class="avatar cartoon" src="./annie.jpg" alt="Annie"></div>
      <div class="meta"><b>Annie</b><small>生日快乐呀 ✨<br>今天你是主角！</small></div>
    </div>

    <div class="game-shell">
      <div class="topbar">
        <div class="chips">
          <div class="chip">分数：<b id="score">0</b></div>
          <div class="chip">生命：<b id="lives">3</b></div>
          <div class="chip">最高分：<b id="best">0</b></div>
        </div>
      </div>
      <div class="field" id="field">
        <div class="floating-title">Catch the Cake for Annie! 🍰</div>
        <div class="player" id="player"></div>
        <div class="overlay" id="overlay">
          <div class="message">
            <h2>生日小游戏来啦 🎁</h2>
            <p>左右移动 Annie，接住 <b>🍰🎁⭐</b>，躲开 <b>⏰</b></p>
            <p>手机可点按钮，也可左右滑动</p>
            <div class="controls" style="margin-top:12px"><button id="startBtn">开始游戏</button></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <button id="restartBtn">重新开始</button>
        <button id="musicBtn" class="secondary">音乐：开</button>
      </div>
      <div class="touch">
        <button class="empty"></button>
        <button id="leftBtn">←</button>
        <button id="rightBtn">→</button>
      </div>
      <div class="tip">电脑：← → 控制 ｜ 手机：按按钮或在游戏区域左右滑动</div>
    </div>
  </div>

<script>
const field = document.getElementById('field');
const player = document.getElementById('player');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const musicBtn = document.getElementById('musicBtn');
const leftBtn = document.getElementById('leftBtn');
const rightBtn = document.getElementById('rightBtn');
const confetti = document.getElementById('confetti');
const bgm = document.getElementById('bgm');

let score = 0, lives = 3, best = Number(localStorage.getItem('annie-bday-best') || 0);
let playerX = 0.5, running = false, spawnTimer = null, animTimer = null;
let musicOn = true;
bestEl.textContent = best;

function makeConfetti() {
  const colors = ['#f472b6','#fbbf24','#60a5fa','#34d399','#ffffff'];
  for (let i = 0; i < 68; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random()*100 + 'vw';
    s.style.width = (8 + Math.random()*8) + 'px';
    s.style.height = (14 + Math.random()*12) + 'px';
    s.style.background = colors[i % colors.length];
    s.style.animationDuration = (4.5 + Math.random()*4.5) + 's';
    s.style.animationDelay = (Math.random()*-8) + 's';
    s.style.transform = `translateY(-10vh) rotate(${Math.random()*360}deg)`;
    confetti.appendChild(s);
  }
}

function burstFireworks(count = 20) {
  const colors = ['#f472b6','#fbbf24','#60a5fa','#34d399','#fff'];
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('span');
    dot.style.position = 'fixed';
    dot.style.left = (10 + Math.random()*80) + 'vw';
    dot.style.top = (10 + Math.random()*55) + 'vh';
    dot.style.width = '10px';
    dot.style.height = '10px';
    dot.style.borderRadius = '50%';
    dot.style.background = colors[Math.floor(Math.random()*colors.length)];
    dot.style.boxShadow = `0 0 12px ${dot.style.background}, 0 0 28px ${dot.style.background}`;
    dot.style.pointerEvents = 'none';
    dot.style.zIndex = '2';
    dot.style.opacity = '0';
    dot.animate([
      { transform:'scale(0.2)', opacity:0 },
      { transform:'scale(1.8)', opacity:1, offset:0.18 },
      { transform:`translate(${(Math.random()*160-80)}px, ${(Math.random()*160-80)}px) scale(0.8)`, opacity:0 }
    ], { duration: 1400 + Math.random()*700, easing:'ease-out' });
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 2200);
  }
}
makeConfetti();
setTimeout(() => burstFireworks(26), 500);

function playBirthdayLoop(){
  if(!musicOn) return;
  bgm.currentTime = 0;
  bgm.volume = 0.9;
  bgm.play().catch(() => {});
}
function stopMusic(){
  bgm.pause();
}

function updateHUD(){ scoreEl.textContent = score; livesEl.textContent = lives; bestEl.textContent = best; }
function setPlayer(){ const max = field.clientWidth - player.clientWidth; player.style.left = (playerX * max) + 'px'; }
function movePlayer(delta){ playerX = Math.min(1, Math.max(0, playerX + delta)); setPlayer(); }
function resetGame(){ document.querySelectorAll('.item').forEach(e=>e.remove()); score = 0; lives = 3; playerX = 0.5; updateHUD(); setPlayer(); }

function spawnItem(){
  if(!running) return;
  const item = document.createElement('div');
  item.className = 'item';
  const bag = [
    {emoji:'🍰', good:true, points:2},
    {emoji:'🎁', good:true, points:3},
    {emoji:'⭐', good:true, points:1},
    {emoji:'⏰', good:false, points:0}
  ];
  const pick = Math.random() < 0.22 ? bag[3] : bag[Math.floor(Math.random()*3)];
  item.textContent = pick.emoji;
  item.dataset.good = pick.good;
  item.dataset.points = pick.points;
  item.style.left = Math.random() * (field.clientWidth - 40) + 'px';
  item.style.top = '56px';
  field.appendChild(item);
  let y = 56;
  const speed = 2.4 + Math.random() * 2.2 + score * 0.03;
  function fall(){
    if(!running){ item.remove(); return; }
    y += speed;
    item.style.top = y + 'px';
    const ir = item.getBoundingClientRect();
    const pr = player.getBoundingClientRect();
    if(!(ir.right < pr.left || ir.left > pr.right || ir.bottom < pr.top || ir.top > pr.bottom)){
      if(item.dataset.good === 'true'){
        score += Number(item.dataset.points);
        if(score > best){ best = score; localStorage.setItem('annie-bday-best', best); }
      } else {
        lives -= 1;
      }
      updateHUD();
      item.remove();
      if(lives <= 0) endGame(false);
      return;
    }
    if(y > field.clientHeight - 12){ item.remove(); if(item.dataset.good === 'true'){} }
    else requestAnimationFrame(fall);
  }
  requestAnimationFrame(fall);
}

function startGame(){
  resetGame();
  running = true;
  overlay.style.display = 'none';
  stopTimers();
  setPlayer();
  burstFireworks(18);
  if(musicOn) playBirthdayLoop();
  spawnTimer = setInterval(spawnItem, 700);
}
function stopTimers(){ if(spawnTimer) clearInterval(spawnTimer); if(animTimer) cancelAnimationFrame(animTimer); }
function endGame(win){
  running = false; stopTimers();
  burstFireworks(win ? 30 : 14);
  overlay.innerHTML = `<div class="message"><h2>${win ? '生日快乐，Annie！🎉' : '礼物先送到这里啦 🎂'}</h2><p>本局得分：<b>${score}</b></p><p>${win ? '愿你今天被快乐和惊喜包围。' : '再玩一局，把更多蛋糕和礼物接住吧～'}</p><div class="controls" style="margin-top:12px"><button id="againBtn">再玩一局</button></div></div>`;
  overlay.style.display = 'grid';
  document.getElementById('againBtn').onclick = startGame;
}

startBtn.onclick = startGame;
restartBtn.onclick = startGame;
musicBtn.onclick = () => { musicOn = !musicOn; musicBtn.textContent = `音乐：${musicOn ? '开' : '关'}`; if(musicOn) playBirthdayLoop(); else stopMusic(); };
leftBtn.onclick = () => movePlayer(-0.13);
rightBtn.onclick = () => movePlayer(0.13);
window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') movePlayer(-0.09); if(e.key==='ArrowRight') movePlayer(0.09); });

let touchStartX = null;
field.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
field.addEventListener('touchmove', e => {
  if(touchStartX == null) return;
  const dx = e.touches[0].clientX - touchStartX;
  movePlayer(dx / field.clientWidth * 0.28);
  touchStartX = e.touches[0].clientX;
}, {passive:true});
field.addEventListener('touchend', () => touchStartX = null, {passive:true});
window.addEventListener('resize', setPlayer);
setPlayer(); updateHUD();
</script>
</body>
</html>
